name: Game Health

on:
  push:
    branches: [main]
    paths-ignore:
      - 'graphify-out/**'
      - 'docs/wiki/**'
      - 'game-health/latest.json'

permissions:
  contents: write
  issues: write

concurrency:
  group: game-health
  cancel-in-progress: true

jobs:
  # ─── Job 1: Update graphify knowledge graph ────────────────────────────────
  graphify-update:
    name: Graphify Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install graphify
        run: npm install --global graphify-ts

      - name: Run graphify update
        run: graphify update .
        continue-on-error: true

      - name: Commit graphify changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graphify-out/
          if git diff --cached --quiet; then
            echo "No graphify changes to commit"
          else
            git commit -m "chore: update graphify knowledge graph [skip ci]"
            git push
          fi

  # ─── Job 2: Regenerate wiki from game data ─────────────────────────────────
  wiki-update:
    name: Wiki Update
    needs: graphify-update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate wiki pages
        run: node scripts/generate-wiki.js

      - name: Commit wiki changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add docs/wiki/
          if git diff --cached --quiet; then
            echo "No wiki changes to commit"
          else
            git commit -m "docs: regenerate wiki from game data"
            git push
          fi

  # ─── Job 3: Run stress tests ───────────────────────────────────────────────
  stress-test:
    name: Stress Test
    needs: wiki-update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run stress tests
        run: npx vitest run tests/stress/ --reporter=json --outputFile=/tmp/stress-results.json
        continue-on-error: true

      - name: Parse stress test results
        run: >-
          node scripts/parse-stress-results.js
          --input /tmp/stress-results.json
          --output /tmp/game-health-report.json
          --baseline game-health/latest.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-health-report
          path: /tmp/game-health-report.json
          retention-days: 30

  # ─── Job 4: Create/close GitHub issues for findings ────────────────────────
  create-issues:
    name: Create Issues
    runs-on: ubuntu-latest
    needs: stress-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: game-health-report
          path: /tmp

      - name: Create/close balance issues
        run: node scripts/create-balance-issues.js --report /tmp/game-health-report.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Job 5: Update README dashboard ────────────────────────────────────────
  update-dashboard:
    name: Update Dashboard
    runs-on: ubuntu-latest
    needs: stress-test
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download report
        uses: actions/download-artifact@v4
        with:
          name: game-health-report
          path: /tmp

      - name: Copy report to game-health/
        run: cp /tmp/game-health-report.json game-health/latest.json

      - name: Update README dashboard
        run: node scripts/update-readme-dashboard.js --report /tmp/game-health-report.json

      - name: Commit dashboard + baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add README.md game-health/latest.json
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit"
          else
            git commit -m "chore: update game health dashboard [skip ci]"
            git push
          fi
