name: Sync Wiki to GitHub Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync wiki pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone GitHub Wiki
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git /tmp/wiki

      - name: Copy wiki pages
        run: |
          # Mirror docs/wiki/ into the cloned wiki repo (recursive, removes deleted pages)
          rsync -a --delete --exclude='.git' docs/wiki/ /tmp/wiki/

          # GitHub Wiki uses Home.md as the landing page — rename README
          if [ -f /tmp/wiki/README.md ]; then
            mv /tmp/wiki/README.md /tmp/wiki/Home.md
          fi

      - name: Commit and push
        working-directory: /tmp/wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "Sync wiki from docs/wiki/ (${{ github.sha }})"
            git push
          fi
