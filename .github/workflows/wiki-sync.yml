name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push docs/wiki to GitHub Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          REPO="${{ github.repository }}"
          WIKI_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git"

          # Clone the wiki repo
          git clone "$WIKI_URL" wiki-out

          # Copy all wiki pages
          cp docs/wiki/*.md wiki-out/

          # GitHub Wiki uses Home.md as the landing page
          if [ -f "wiki-out/README.md" ]; then
            cp wiki-out/README.md wiki-out/Home.md
            rm wiki-out/README.md
          fi

          cd wiki-out
          git add -A

          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            git commit -m "chore: sync wiki from docs/wiki/ [skip ci]"
            git push
          fi
